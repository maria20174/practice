name: CI
on:
push: ["**"]
pull_request:
branches: ["main"]
jobs:
build-and-test:
runs-on: ibuntu-latest
steps:
-uses: actions/checkout@v4
-name: Setup .NET
uses: actions/setup-dotnet@v4
with:
dotnet-version: 8.0.x
-name: Restore
run: dotnet restore
-name: Build
run: dotnet build --no-restore
-name: Test
run: dotnet test --no-build --verbosity normal
